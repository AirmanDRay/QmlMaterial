name: CI — Qt 6.8.3 multi-compiler build & tests
on: [push, pull_request]

jobs:
  matrix:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            compiler: gcc
          - runner: ubuntu-latest
            compiler: clang
          - runner: macos-latest
            compiler: xcode
          - runner: windows-latest
            compiler: msvc
          - runner: windows-latest
            compiler: mingw
          - runner: windows-latest
            compiler: clang
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgl1-mesa-dev wget unzip
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt-get install -y clang; fi
        shell: bash

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja
        shell: bash

      - name: Install system deps (Windows MSVC)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        run: |
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install -y visualstudio2022-workload-vctools --ignore-checksums
        shell: powershell

      - name: Install system deps (Windows MinGW)
        if: runner.os == 'Windows' && matrix.compiler == 'mingw'
        run: |
          choco install -y msys2
          refreshenv
          C:\msys64\usr\bin\bash -lc "pacman -Syu --noconfirm"
          C:\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-x86_64-toolchain base-devel"
        shell: powershell

      - name: Install system deps (Windows clang/LLVM)
        if: runner.os == 'Windows' && matrix.compiler == 'clang'
        run: |
          choco install -y llvm
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        shell: powershell

      - name: Install Qt 6.8.3 (jurplel action)
        id: install_qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: ${{ matrix.runner == 'macos-latest' && 'mac' || matrix.runner == 'windows-latest' && 'windows' || 'linux' }}

      - name: Show Qt info (debug)
        run: |
          echo "QTDIR=${QTDIR:-$QT_INSTALL_DIR}"
          ls -la "${QTDIR:-$QT_INSTALL_DIR}/lib/cmake" || true
        shell: bash

      - name: Ensure ShaderTools present (Linux)
        if: runner.os == 'Linux'
        env:
          QTDIR: ${{ env.QTDIR || env.QT_INSTALL_DIR || '/opt/Qt/6.8.3' }}
        run: |
          echo "Checking for Qt6ShaderTools in ${QTDIR}"
          if [ -d "${QTDIR}/lib/cmake/Qt6ShaderTools" ]; then
            echo "Qt6ShaderTools found in Qt install; skipping distro install."
            ls -la "${QTDIR}/lib/cmake/Qt6ShaderTools" || true
            exit 0
          fi

          echo "Qt6ShaderTools not found in Qt install; installing distro packages..."
          sudo apt-get update
          # install runtime + dev so CMake config files are present
          sudo apt-get install -y libqt6shadertools6 qt6-shadertools-dev || true

          echo "Distro ShaderTools install attempted. System cmake dir listing:"
          ls -la /usr/lib/x86_64-linux-gnu/cmake || true
          echo "Check for Qt6ShaderTools in system cmake tree:"
          ls -la /usr/lib/x86_64-linux-gnu/cmake/Qt6ShaderTools || true
        shell: bash

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          # include system cmake path so Qt6ShaderTools from distro can be found if needed
          CMAKE_PREFIX_PATH: ${{ env.QTDIR || env.QT_INSTALL_DIR || '' }}:/usr/lib/x86_64-linux-gnu/cmake
        run: |
          # Resolve QTDIR (the jurplel action or other installer sets QTDIR or QT_INSTALL_DIR)
          QTDIR="${QTDIR:-${QT_INSTALL_DIR:-/opt/Qt/6.8.3}}"
          echo "Using QTDIR=${QTDIR}"

          # Prefer Qt-installed tools and libraries so qsb and libQt6ShaderTools come from the same Qt tree
          # Try common layout variants (gcc_64, lib/cmake etc.)
          if [ -d "${QTDIR}/gcc_64/bin" ]; then
            QT_BIN="${QTDIR}/gcc_64/bin"
            QT_LIB="${QTDIR}/gcc_64/lib"
          elif [ -d "${QTDIR}/bin" ]; then
            QT_BIN="${QTDIR}/bin"
            QT_LIB="${QTDIR}/lib"
          else
            QT_BIN="${QTDIR}/bin"
            QT_LIB="${QTDIR}/lib"
          fi

          echo "QT_BIN=${QT_BIN}"
          echo "QT_LIB=${QT_LIB}"

          export PATH="${QT_BIN}:${PATH}"
          export LD_LIBRARY_PATH="${QT_LIB}:${LD_LIBRARY_PATH:-}"

          # show which qsb and which lib are used (debug)
          echo "which qsb: $(which qsb || true)"
          echo "qsb --version: $(qsb --version 2>/dev/null || true)"
          echo "ldd qsb (first lines):"
          ldd "$(which qsb 2>/dev/null || true)" 2>/dev/null | head -n 20 || true

          mkdir -p build
          if [ "${{ runner.os }}" = "Linux" ]; then
            if [ "${{ matrix.compiler }}" = "clang" ]; then
              CC=clang CXX=clang++ cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
                -DQt6ShaderTools_DIR="/usr/lib/x86_64-linux-gnu/cmake/Qt6ShaderTools"
            else
              CC=gcc CXX=g++ cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
                -DQt6ShaderTools_DIR="/usr/lib/x86_64-linux-gnu/cmake/Qt6ShaderTools"
            fi
          else
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}"
          fi
        shell: bash

      - name: Configure CMake (Windows MSVC)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        env:
          CMAKE_PREFIX_PATH: ${{ env.QTDIR || env.QT_INSTALL_DIR || '' }}
        run: |
          mkdir -p build
          cmake -S . -B build -G "Ninja" -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}"
        shell: powershell

      - name: Configure CMake (Windows MinGW)
        if: runner.os == 'Windows' && matrix.compiler == 'mingw'
        env:
          CMAKE_PREFIX_PATH: ${{ env.QTDIR || env.QT_INSTALL_DIR || '' }}
        run: |
          C:/msys64/usr/bin/bash -lc "cmake -S /github/workspace -B /github/workspace/build -G 'MSYS Makefiles' -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH='${CMAKE_PREFIX_PATH}' -DCMAKE_C_COMPILER=/mingw64/bin/gcc -DCMAKE_CXX_COMPILER=/mingw64/bin/g++"
        shell: powershell

      - name: Configure CMake (Windows clang)
        if: runner.os == 'Windows' && matrix.compiler == 'clang'
        env:
          CMAKE_PREFIX_PATH: ${{ env.QTDIR || env.QT_INSTALL_DIR || '' }}
        run: |
          mkdir -p build
          cmake -S . -B build -G "Ninja" -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
        shell: powershell

      - name: Build (Linux / macOS, parallel)
        if: runner.os != 'Windows'
        run: |
          echo "Building (Release) on $RUNNER_OS"
          cmake --build build --config Release --parallel $(nproc || echo 2)
        shell: bash

      - name: Build (Windows, parallel)
        if: runner.os == 'Windows'
        run: |
          Write-Host "Building (Release) on Windows"
          cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS
        shell: powershell

      - name: Run tests
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          QT_QPA_PLATFORM: "offscreen"
          QML_IMPORT_PATH: "${{ github.workspace }}/build/qml_modules"
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ctest --test-dir build --output-on-failure -E "layout" -j 2
          else
            ctest --test-dir build --output-on-failure --parallel $(nproc || echo 2)
          fi
        shell: bash

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.runner }}-${{ matrix.compiler }}
          path: build/Testing
